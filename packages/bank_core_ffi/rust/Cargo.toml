[package]
name = "bank_core_ffi_rust"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["staticlib"]

[profile.dev]
opt-level = 3
debug = true
debug-assertions = false
overflow-checks = false
codegen-units = 1

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
